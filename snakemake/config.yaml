# Sample ImpuT2T config — copy and edit for your run.
#
# Reference data lives in database/ at the repository root (not in git; see README).
# Paths below are relative to snakemake/:
#   ../database/human472.agc
#   ../database/high_quality_set/      → small_pan (agc extract from human472.agc)
#   ../database/chr_agc/               → download pangenome_chr*.agc from Index zone
#   ../database/chr_split/             → pangenome_path (agc extract from chr_agc/)
#
# Larger donor panels: see config.HG002.yaml, config.CN1.200.yaml, etc.

# --- RagTag scaffolding references (full genomes from human472.agc) ---
small_pan: [
        [ "CHM13",    "../database/high_quality_set/100000_CHM13.pri.fa" ],
        [ "GRCh38",   "../database/high_quality_set/110000_GRCh38.pri.fa" ],
        [ "CN1.1",    "../database/high_quality_set/120001_CN1.pat.fa" ],
        [ "CN1.2",    "../database/high_quality_set/120002_CN1.mat.fa" ],
        [ "YAO.1",    "../database/high_quality_set/120003_YAO.pat.fa" ],
        [ "YAO.2",    "../database/high_quality_set/120004_YAO.mat.fa" ],
        [ "KSA001.1", "../database/high_quality_set/120005_KSA001.pat.fa" ],
        [ "KSA001.2", "../database/high_quality_set/120006_KSA001.mat.fa" ],
        [ "HG002.1",  "../database/high_quality_set/200001_HG002.pat.fa" ],
        [ "HG002.2",  "../database/high_quality_set/200002_HG002.mat.fa" ],
]

small_pan_prefixes: [
    [ "CHM13",    "CHM13#0#" ],
    [ "GRCh38",   "GRCh38#0#" ],
    [ "CN1.1",    "CN1#1#" ],
    [ "CN1.2",    "CN1#2#" ],
    [ "YAO.1",    "YAO#1#GWHDOOG" ],
    [ "YAO.2",    "YAO#2#GWHDQZJ" ],
    [ "KSA001.1", "KSA001#1#" ],
    [ "KSA001.2", "KSA001#2#" ],
    [ "HG002.1",  "HG002#1#" ],
    [ "HG002.2",  "HG002#2#" ],
]

# --- Query assemblies to patch ---
# One chromosome list per query (same order as queries).
target_chromosomes:
  - ["chr1", "chr2", "chr3", "chr4", "chr5", "chr6", "chr7", "chr8", "chr9", "chr10", "chr11", "chr12", "chr13", "chr14", "chr15", "chr16", "chr17", "chr18", "chr19", "chr20", "chr21", "chr22", "chrY"]
  - ["chr1", "chr2", "chr3", "chr4", "chr5", "chr6", "chr7", "chr8", "chr9", "chr10", "chr11", "chr12", "chr13", "chr14", "chr15", "chr16", "chr17", "chr18", "chr19", "chr20", "chr21", "chr22", "chrX", "chrM"]

queries:
  - ["hap1", "path/to/query.hap1.fa"]
  - ["hap2", "path/to/query.hap2.fa"]

sample: "my_sample"
output_dir: output
run_tag: "run0"
sample_list_file: "subsample_lists/sample_id.log"
heavy_jobs_flat_threshold: 6000
threads: 48
ragtag_threads: 3

